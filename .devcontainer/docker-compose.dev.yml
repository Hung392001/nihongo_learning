version: '3.8'

services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    
    working_dir: /app
    
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
      - VITE_APP_ENV=development
    
    volumes:
      # Mount host project into /app
      - ..:/app:cached
      # Only dist needs a separate volume to avoid host contamination
      - /app/dist
    
    ports:
      - "5173:5173"
    
    tty: true
    stdin_open: true
