# Production docker-compose configuration for Nihongo Learning
# Usage: docker-compose -f docker-compose.prod.yml up -d

version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_ENV: production
    
    # Use production container
    image: nihongo-learning:production
    
    container_name: nihongo-learning-app
    
    restart: unless-stopped
    
    environment:
      - NODE_ENV=production
      - VITE_APP_ENV=production
      # Port the app runs on inside the container
      - PORT=80
    
    ports:
      # Map host port 80 to container port 80
      - "80:80"
      # Also expose on 8080 for flexibility
      - "8080:80"
    
    # Health check
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    
    # Resource limits (optional)
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
    
    # Security options
    security_opt:
      - no-new-privileges:true
    
    # Read-only filesystem for security (except /tmp)
    read_only: true
    tmpfs:
      - /tmp

  # Optional: Nginx reverse proxy for better production serving
  nginx:
    image: nginx:alpine
    container_name: nihongo-learning-nginx
    restart: unless-stopped
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./dist:/usr/share/nginx/html:ro
    depends_on:
      - web
    profiles:
      - nginx
